name: Update Fork
on:
  schedule:
    # Runs at 12:00am UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch:  # This allows you to manually trigger the workflow from the Actions tab.

jobs:
  update-fork:
    runs-on: ubuntu-latest
    steps:
      - uses: Shurtu-gal/autoupdate-fork-action@v1.0.1
        with:
          github_token: ${{ secrets.GH_PAT }}
          pr_filter: labelled
          pr_label: fork-update
          # Only update PRs on master branch
          base_branch: main
